name: Bug report
description: Report a reproducible Shorty Link bug.
title: "bug: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Shorty Link release tag or commit SHA.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Redirects
        - Admin UI
        - Auth/passkeys
        - API keys
        - Domains
        - D1 migrations
        - Deployment/configuration
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, tokens, API keys, and private URLs before posting.
      render: text
