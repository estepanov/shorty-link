name: Run D1 Production Migrations

on:
  push:
    branches:
      - main
    paths:
      - "migrations/**"
      - "src/server/db/schema.ts"
      - "drizzle.config.ts"
      - "wrangler.jsonc"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/d1-production-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-d1-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply production D1 migrations
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || vars.SHORTY_LINK_DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
